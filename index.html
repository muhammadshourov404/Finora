<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finora — Master Your Money</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#0A0E14;
  --surface:#12161F;
  --surface-2:#181D29;
  --border:#232A38;
  --text:#E9ECF1;
  --text-dim:#8B93A5;
  --emerald:#00D9A3;
  --emerald-dim:#00D9A322;
  --gold:#E8B95C;
  --danger:#FF6B6B;
  --radius:16px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}
[lang-bn]{font-family:'Hind Siliguri','Inter',sans-serif;}

/* ambient background */
.bg-glow{
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(600px circle at 15% 20%, #00D9A314, transparent 60%),
    radial-gradient(500px circle at 85% 75%, #E8B95C10, transparent 60%);
}

.wrap{
  position:relative; z-index:1;
  min-height:100vh;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:24px;
  gap:36px;
}

/* Signature card */
.balance-card{
  width:100%; max-width:340px;
  background:linear-gradient(155deg,#161B26 0%, #10141D 100%);
  border:1px solid var(--border);
  border-radius:20px;
  padding:24px;
  position:relative;
  overflow:hidden;
  transform:perspective(800px) rotateX(4deg);
  box-shadow:0 30px 60px -20px #00000080, inset 0 1px 0 #ffffff08;
  transition:transform .4s ease;
}
.balance-card::before{
  content:'';
  position:absolute; top:-50%; left:-20%; width:140%; height:200%;
  background:linear-gradient(115deg, transparent 40%, #00D9A312 50%, transparent 60%);
  pointer-events:none;
}
.card-top{display:flex; justify-content:space-between; align-items:flex-start;}
.card-label{font-size:12px; color:var(--text-dim); letter-spacing:.06em; text-transform:uppercase;}
.card-logo{display:flex; align-items:center; gap:6px; font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:14px; color:var(--emerald);}
.card-balance{
  font-family:'Space Grotesk',sans-serif;
  font-size:38px; font-weight:600;
  margin-top:18px;
  letter-spacing:-0.01em;
}
.card-balance span{font-size:18px; color:var(--text-dim); font-weight:500;}
.card-foot{display:flex; justify-content:space-between; margin-top:22px;}
.card-chip{
  width:38px; height:28px; border-radius:6px;
  background:linear-gradient(135deg,#E8B95C,#9c7a3a);
}
.card-trend{display:flex; align-items:center; gap:4px; color:var(--emerald); font-size:13px; font-weight:600;}

/* Auth panel */
.panel{
  width:100%; max-width:380px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:32px 28px;
}
.brand{display:flex; align-items:center; gap:10px; margin-bottom:6px;}
.brand-mark{
  width:34px; height:34px; border-radius:9px;
  background:linear-gradient(135deg,var(--emerald),#00a87e);
  display:flex; align-items:center; justify-content:center;
}
.brand-name{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:20px;}
.tagline{color:var(--text-dim); font-size:13.5px; margin-bottom:26px;}

.tabs{display:flex; background:var(--surface-2); border-radius:11px; padding:4px; margin-bottom:24px;}
.tab{
  flex:1; text-align:center; padding:9px 0; border-radius:8px;
  font-size:14px; font-weight:600; color:var(--text-dim);
  cursor:pointer; transition:.2s;
}
.tab.active{background:var(--emerald); color:#06140F;}

.field{margin-bottom:14px;}
.field label{display:block; font-size:12.5px; color:var(--text-dim); margin-bottom:6px; font-weight:500;}
.input-box{
  display:flex; align-items:center; gap:10px;
  background:var(--surface-2); border:1px solid var(--border);
  border-radius:10px; padding:11px 13px;
  transition:.2s;
}
.input-box:focus-within{border-color:var(--emerald); box-shadow:0 0 0 3px var(--emerald-dim);}
.input-box input{
  background:none; border:none; outline:none; color:var(--text);
  font-size:14.5px; width:100%; font-family:inherit;
}
.input-box svg{color:var(--text-dim); flex-shrink:0; width:17px; height:17px;}

.btn-primary{
  width:100%; padding:13px 0; margin-top:8px;
  background:var(--emerald); color:#06140F;
  border:none; border-radius:10px;
  font-weight:700; font-size:14.5px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:8px;
  transition:.2s;
}
.btn-primary:hover{background:#00f0b5;}
.btn-primary:disabled{opacity:.6; cursor:not-allowed;}

.msg{
  font-size:13px; padding:10px 12px; border-radius:8px;
  margin-bottom:14px; display:none;
}
.msg.error{background:#FF6B6B18; color:var(--danger); display:block;}
.msg.success{background:#00D9A318; color:var(--emerald); display:block;}

.switch-row{
  text-align:center; margin-top:18px; font-size:13.5px; color:var(--text-dim);
}
.switch-row a{color:var(--emerald); font-weight:600; cursor:pointer;}

.lang-toggle{
  position:fixed; top:18px; right:18px; z-index:5;
  display:flex; background:var(--surface); border:1px solid var(--border);
  border-radius:9px; padding:3px; gap:2px;
}
.lang-toggle button{
  padding:5px 11px; border-radius:7px; border:none; background:none;
  color:var(--text-dim); font-size:12.5px; font-weight:600; cursor:pointer;
}
.lang-toggle button.active{background:var(--surface-2); color:var(--text);}

@media (min-width:760px){
  .wrap{flex-direction:row; align-items:center; gap:64px; max-width:920px;}
  .balance-card{max-width:300px;}
}
</style>
</head>
<body>

<div class="bg-glow"></div>

<div class="lang-toggle">
  <button id="lang-en" class="active" onclick="setLang('en')">EN</button>
  <button id="lang-bn" onclick="setLang('bn')">বাং</button>
</div>

<div class="wrap">

  <!-- Signature balance card -->
  <div class="balance-card" id="tiltCard">
    <div class="card-top">
      <div>
        <div class="card-label" data-i18n="card.label">Total Balance</div>
        <div class="card-balance" id="animBalance">৳ <span id="balNum">0</span></div>
      </div>
      <div class="card-logo">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M2 12h20"/></svg>
        FINORA
      </div>
    </div>
    <div class="card-foot">
      <div class="card-chip"></div>
      <div class="card-trend">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 17 9 11 13 15 21 7"/><polyline points="14 7 21 7 21 14"/></svg>
        <span data-i18n="card.trend">+12.4% this month</span>
      </div>
    </div>
  </div>

  <!-- Auth panel -->
  <div class="panel">
    <div class="brand">
      <div class="brand-mark">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#06140F" stroke-width="2.5"><path d="M12 2v20M2 12h20"/></svg>
      </div>
      <div class="brand-name">Finora</div>
    </div>
    <div class="tagline" data-i18n="tagline">Your money, perfectly tracked.</div>

    <div class="tabs">
      <div class="tab active" id="tabLogin" onclick="switchTab('login')" data-i18n="tab.login">Log In</div>
      <div class="tab" id="tabSignup" onclick="switchTab('signup')" data-i18n="tab.signup">Sign Up</div>
    </div>

    <div class="msg" id="msgBox"></div>

    <!-- LOGIN FORM -->
    <form id="loginForm">
      <div class="field">
        <label data-i18n="field.email">Email</label>
        <div class="input-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z" opacity="0"/><path d="M22 6l-10 7L2 6"/><rect x="2" y="4" width="20" height="16" rx="2"/></svg>
          <input type="email" id="loginEmail" placeholder="you@example.com" required>
        </div>
      </div>
      <div class="field">
        <label data-i18n="field.password">Password</label>
        <div class="input-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="loginPassword" placeholder="••••••••" required>
        </div>
      </div>
      <button type="submit" class="btn-primary" id="loginBtn">
        <span data-i18n="btn.login">Log In</span>
      </button>
    </form>

    <!-- SIGNUP FORM -->
    <form id="signupForm" style="display:none;">
      <div class="field">
        <label data-i18n="field.name">Full Name</label>
        <div class="input-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a8 8 0 0 1 16 0v1"/></svg>
          <input type="text" id="signupName" placeholder="Muhammad Shourov" required>
        </div>
      </div>
      <div class="field">
        <label data-i18n="field.email">Email</label>
        <div class="input-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 6l-10 7L2 6"/></svg>
          <input type="email" id="signupEmail" placeholder="you@example.com" required>
        </div>
      </div>
      <div class="field">
        <label data-i18n="field.password">Password</label>
        <div class="input-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="signupPassword" placeholder="At least 6 characters" required minlength="6">
        </div>
      </div>
      <button type="submit" class="btn-primary" id="signupBtn">
        <span data-i18n="btn.signup">Create Account</span>
      </button>
    </form>

    <div class="switch-row" id="switchRow">
      <span data-i18n="switch.noaccount">Don't have an account?</span>
      <a onclick="switchTab('signup')" data-i18n="switch.signup">Sign up</a>
    </div>
  </div>

</div>

<script>
lucide.createIcons();

// ---------- SUPABASE CONFIG ----------
const SUPABASE_URL = "https://kedaqkrxtqsjmekiptvm.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_SZKoXv6qcxYKn_4hKbvcEA_MgEnSrDk";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ---------- i18n ----------
const translations = {
  en: {
    "card.label":"Total Balance", "card.trend":"+12.4% this month",
    "tagline":"Your money, perfectly tracked.",
    "tab.login":"Log In", "tab.signup":"Sign Up",
    "field.email":"Email", "field.password":"Password", "field.name":"Full Name",
    "btn.login":"Log In", "btn.signup":"Create Account",
    "switch.noaccount":"Don't have an account?", "switch.signup":"Sign up",
    "switch.haveaccount":"Already have an account?", "switch.login":"Log in"
  },
  bn: {
    "card.label":"মোট ব্যালেন্স", "card.trend":"+১২.৪% এই মাসে",
    "tagline":"আপনার অর্থ, নিখুঁতভাবে হিসাব করা।",
    "tab.login":"লগ ইন", "tab.signup":"সাইন আপ",
    "field.email":"ইমেইল", "field.password":"পাসওয়ার্ড", "field.name":"পূর্ণ নাম",
    "btn.login":"লগ ইন করুন", "btn.signup":"অ্যাকাউন্ট তৈরি করুন",
    "switch.noaccount":"অ্যাকাউন্ট নেই?", "switch.signup":"সাইন আপ করুন",
    "switch.haveaccount":"ইতিমধ্যে অ্যাকাউন্ট আছে?", "switch.login":"লগ ইন করুন"
  }
};
let currentLang = localStorage.getItem('finora_lang') || 'en';
let currentTab = 'login';

function applyTranslations(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const key = el.getAttribute('data-i18n');
    if(translations[currentLang][key]) el.textContent = translations[currentLang][key];
  });
  document.getElementById('htmlRoot').lang = currentLang;
  document.body.style.fontFamily = currentLang === 'bn' ? "'Hind Siliguri','Inter',sans-serif" : "'Inter',sans-serif";
}
function setLang(lang){
  currentLang = lang;
  localStorage.setItem('finora_lang', lang);
  document.getElementById('lang-en').classList.toggle('active', lang==='en');
  document.getElementById('lang-bn').classList.toggle('active', lang==='bn');
  applyTranslations();
  updateSwitchRow();
}
function updateSwitchRow(){
  const row = document.getElementById('switchRow');
  if(currentTab === 'login'){
    row.innerHTML = `<span>${translations[currentLang]['switch.noaccount']}</span> <a onclick="switchTab('signup')">${translations[currentLang]['switch.signup']}</a>`;
  } else {
    row.innerHTML = `<span>${translations[currentLang]['switch.haveaccount']}</span> <a onclick="switchTab('login')">${translations[currentLang]['switch.login']}</a>`;
  }
}

function switchTab(tab){
  currentTab = tab;
  document.getElementById('tabLogin').classList.toggle('active', tab==='login');
  document.getElementById('tabSignup').classList.toggle('active', tab==='signup');
  document.getElementById('loginForm').style.display = tab==='login' ? 'block':'none';
  document.getElementById('signupForm').style.display = tab==='signup' ? 'block':'none';
  hideMsg();
  updateSwitchRow();
}

function showMsg(text, type){
  const box = document.getElementById('msgBox');
  box.textContent = text;
  box.className = 'msg ' + type;
}
function hideMsg(){
  document.getElementById('msgBox').className = 'msg';
}

// ---------- Auth handlers ----------
document.getElementById('loginForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  hideMsg();
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  btn.disabled = false;

  if(error){
    showMsg(error.message, 'error');
  } else {
    showMsg(currentLang==='bn' ? 'সফলভাবে লগইন হয়েছে!' : 'Logged in successfully!', 'success');
    setTimeout(()=> window.location.href = 'app.html', 700);
  }
});

document.getElementById('signupForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  hideMsg();
  const btn = document.getElementById('signupBtn');
  btn.disabled = true;
  const name = document.getElementById('signupName').value;
  const email = document.getElementById('signupEmail').value;
  const password = document.getElementById('signupPassword').value;

  const { data, error } = await supabase.auth.signUp({
    email, password,
    options: { data: { full_name: name } }
  });
  btn.disabled = false;

  if(error){
    showMsg(error.message, 'error');
  } else {
    showMsg(currentLang==='bn' ? 'অ্যাকাউন্ট তৈরি হয়েছে! রিডাইরেক্ট হচ্ছে...' : 'Account created! Redirecting...', 'success');
    setTimeout(()=> window.location.href = 'app.html', 900);
  }
});

// redirect if already logged in
supabase.auth.getSession().then(({data})=>{
  if(data.session) window.location.href = 'app.html';
});

// ---------- card tilt + count-up ----------
const card = document.getElementById('tiltCard');
document.addEventListener('mousemove', (e)=>{
  const rx = (e.clientY / window.innerHeight - 0.5) * -6;
  const ry = (e.clientX / window.innerWidth - 0.5) * 8;
  card.style.transform = `perspective(800px) rotateX(${4+rx}deg) rotateY(${ry}deg)`;
});

function countUp(){
  const el = document.getElementById('balNum');
  let val = 0;
  const target = 84250;
  const step = target / 60;
  const iv = setInterval(()=>{
    val += step;
    if(val >= target){ val = target; clearInterval(iv); }
    el.textContent = Math.floor(val).toLocaleString();
  }, 16);
}
countUp();

applyTranslations();
setLang(currentLang);
</script>
</body>
</html>
